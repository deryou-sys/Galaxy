name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: Android
          os: ubuntu-latest
          target: Android

    name: ${{ matrix.config.name }}
    uses: geode-sdk/build-geode-mod/.github/workflows/build.yml@main
    with:
      target: ${{ matrix.config.target }}
      combine: true
